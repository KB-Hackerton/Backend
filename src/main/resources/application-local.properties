# ------ DB ------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3307/hack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=1234

# ------ MyBatis ------
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=kb_hack.backend.domain
mybatis.configuration.map-underscore-to-camel-case=true
# (?? ? ???? ??)
# mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ------ Flyway (????) ------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ------ SQL init (???? ???) ------
spring.sql.init.mode=always
# ???? Flyway? ??? schema-locations? ??
spring.sql.init.data-locations=classpath:sql/local/init_test_data.sql

# ------ swagger ------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
